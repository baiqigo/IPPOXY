services:
  outlook-register:
    build:
      context: .
      dockerfile: Dockerfile
    image: outlook-register-lainsnl:staging
    network_mode: host
    shm_size: "1gb"
    environment:
      OUTLOOK_BROWSER_PATH: /usr/bin/chromium
      OUTLOOK_HEADLESS: "1"
    volumes:
      - ./Results:/app/Results
      - ./captures:/app/captures
      - ./.profiles:/app/.profiles
    entrypoint: []
    command: ["python", "main.py"]

  smoke:
    image: outlook-register-lainsnl:staging
    network_mode: host
    shm_size: "1gb"
    environment:
      OUTLOOK_BROWSER_PATH: /usr/bin/chromium
      OUTLOOK_HEADLESS: "1"
    volumes:
      - ./Results:/app/Results
      - ./captures:/app/captures
      - ./.profiles:/app/.profiles
    entrypoint: []
    command: ["python", "-u", "smoke_browser.py"]
